name: Finalize AWS Codex Fastlane v1.0.0 template release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: finalize-aws-codex-fastlane-v1.0.0-template
  cancel-in-progress: false

permissions:
  contents: read

env:
  EXPECTED_REPOSITORY: Levi-Breedlove/aws-bootstrap
  EXPECTED_MAIN_SHA: bacc9e180a415aa00f77ea873a7db644e64e3ec5
  EXPECTED_HEAD_BRANCH: release/v1.0.0-finalize-template
  EXPECTED_FEATURE_SHA: af45b587d876eeef1998dfbba01a2517baebd393
  RELEASE_TAG: v1.0.0
  RELEASE_TITLE: AWS Codex Fastlane v1.0.0
  ARCHIVE_NAME: aws-codex-fastlane-bootstrap.zip
  SIDECAR_NAME: aws-codex-fastlane-bootstrap.zip.sha256
  EXPECTED_SHA256: 62d32ee734508fc6079e095647c7887f5c3aecae18e1829a47bce1111e681763
  OLD_RELEASE_TAG: v2.0.0
  OLD_RELEASE_TITLE: AWS Codex Fastlane v2.0.0
  OLD_MAIN_SHA: 5b8989195119e539e5259cab0bd63a3ee83df620
  OLD_SHA256: 4f6e3f4b93550fc15ea40561f6800e96da5242f2f9504e4b3b1e59fda0eb53a0

jobs:
  validate:
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v1.0.0-finalize-template'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out the exact corrected main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify immutable release inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(tr -d '\r\n' < VERSION)" = "1.0.0"
          test -z "$(git ls-files '*.zip' '*.sha256')"

      - name: Run complete safety suite
        run: python -m unittest discover -s tests -v

      - name: Verify manifest, package, and no-AWS showcase
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/update_manifest.py --check
          python scripts/package_release.py --check
          python scripts/run_demo.py --json

  finalize:
    needs:
      - validate
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v1.0.0-finalize-template'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Check out the exact corrected main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate repository and one-shot boundary
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(gh api "repos/$EXPECTED_REPOSITORY" --jq '.default_branch')" = "main"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')" = "$EXPECTED_MAIN_SHA"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_HEAD_BRANCH" --jq '.object.sha')" = "$EVENT_HEAD_SHA"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/feat/v1-template-first" --jq '.object.sha')" = "$EXPECTED_FEATURE_SHA"

          mapfile -t pr_files < <(
            gh api --paginate \
              "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename' | sort -u
          )
          test "${#pr_files[@]}" -eq 1
          test "${pr_files[0]}" = ".github/workflows/finalize-v1.0.0-template.yml"

          mapfile -t actual_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" \
              --jq '.[].name' | sort -u
          )
          mapfile -t expected_branches < <(
            printf '%s\n' \
              feat/v1-template-first \
              main \
              release/v1.0.0-finalize \
              release/v1.0.0-finalize-assets \
              release/v1.0.0-finalize-template \
              release/v1.0.0-readability \
              release/v1.0.0-release-only | sort -u
          )
          test "$(printf '%s\n' "${actual_branches[@]}")" = "$(printf '%s\n' "${expected_branches[@]}")"

          for branch in "${expected_branches[@]}"; do
            if test "$branch" != "main"; then
              test "$(gh api "repos/$EXPECTED_REPOSITORY/branches/$branch" --jq '.protected')" = "false"
            fi
          done

          test "$(gh api --paginate "repos/$EXPECTED_REPOSITORY/releases?per_page=100" \
            --jq '[.[] | select(.tag_name == "v1.0.0")] | length')" = "0"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/matching-refs/tags/v1.0.0" --jq 'length')" = "0"

      - name: Build and verify exact v1 assets
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/update_manifest.py --check
          python scripts/package_release.py
          test "$(sha256sum "dist/$ARCHIVE_NAME" | awk '{print $1}')" = "$EXPECTED_SHA256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$ARCHIVE_NAME" > "$RUNNER_TEMP/expected-v1.sha256"
          cmp --silent "$RUNNER_TEMP/expected-v1.sha256" "dist/$SIDECAR_NAME"
          (cd dist && sha256sum --check "$SIDECAR_NAME")

      - name: Build release notes from the reviewed changelog
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          marker = "## [1.0.0] - 2026-07-17"
          start = changelog.find(marker)
          if start < 0:
              raise SystemExit("v1.0.0 changelog section is missing")
          next_section = changelog.find("\n## [", start + len(marker))
          section = changelog[start:] if next_section < 0 else changelog[start:next_section]
          (Path(os.environ["RUNNER_TEMP"]) / "release-notes.md").write_text(
              section.strip() + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create annotated v1 tag and draft release
        shell: bash
        run: |
          set -Eeuo pipefail
          tag_object_sha="$(gh api --method POST \
            "repos/$EXPECTED_REPOSITORY/git/tags" \
            -f tag="$RELEASE_TAG" \
            -f message="$RELEASE_TITLE" \
            -f object="$EXPECTED_MAIN_SHA" \
            -f type=commit \
            --jq '.sha')"
          gh api --method POST \
            "repos/$EXPECTED_REPOSITORY/git/refs" \
            -f ref="refs/tags/$RELEASE_TAG" \
            -f sha="$tag_object_sha" >/dev/null

          tag_payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          test "$(jq -r '.object.type' <<<"$tag_payload")" = "tag"
          annotated="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$(jq -r '.object.sha' <<<"$tag_payload")")"
          test "$(jq -r '.object.type' <<<"$annotated")" = "commit"
          test "$(jq -r '.object.sha' <<<"$annotated")" = "$EXPECTED_MAIN_SHA"

          gh release create "$RELEASE_TAG" \
            "dist/$ARCHIVE_NAME" \
            "dist/$SIDECAR_NAME" \
            --repo "$EXPECTED_REPOSITORY" \
            --verify-tag \
            --draft \
            --title "$RELEASE_TITLE" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Verify draft bytes, then publish and independently download v1
        shell: bash
        run: |
          set -Eeuo pipefail
          gh api --paginate "repos/$EXPECTED_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.tag_name == "v1.0.0")' > "$RUNNER_TEMP/v1-release.json"
          test "$(jq -r '.tag_name' "$RUNNER_TEMP/v1-release.json")" = "$RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/v1-release.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/v1-release.json")" = "true"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/v1-release.json")" = "false"

          mapfile -t assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/v1-release.json" | sort -u)
          mapfile -t expected < <(printf '%s\n' "$ARCHIVE_NAME" "$SIDECAR_NAME" | sort -u)
          test "$(printf '%s\n' "${assets[@]}")" = "$(printf '%s\n' "${expected[@]}")"

          mkdir -p "$RUNNER_TEMP/v1-draft"
          for asset in "${expected[@]}"; do
            asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/v1-release.json")"
            gh api -H 'Accept: application/octet-stream' \
              "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" > "$RUNNER_TEMP/v1-draft/$asset"
            cmp --silent "$RUNNER_TEMP/v1-draft/$asset" "dist/$asset"
          done
          test "$(sha256sum "$RUNNER_TEMP/v1-draft/$ARCHIVE_NAME" | awk '{print $1}')" = "$EXPECTED_SHA256"
          (cd "$RUNNER_TEMP/v1-draft" && sha256sum --check "$SIDECAR_NAME")

          gh release edit "$RELEASE_TAG" --repo "$EXPECTED_REPOSITORY" --draft=false
          published="$RUNNER_TEMP/v1-published"
          mkdir -p "$published"
          gh release download "$RELEASE_TAG" \
            --repo "$EXPECTED_REPOSITORY" \
            --pattern "$ARCHIVE_NAME" \
            --pattern "$SIDECAR_NAME" \
            --dir "$published"
          cmp --silent "$published/$ARCHIVE_NAME" "dist/$ARCHIVE_NAME"
          cmp --silent "$published/$SIDECAR_NAME" "dist/$SIDECAR_NAME"
          test "$(sha256sum "$published/$ARCHIVE_NAME" | awk '{print $1}')" = "$EXPECTED_SHA256"
          (cd "$published" && sha256sum --check "$SIDECAR_NAME")

      - name: Verify the superseded v2 publication exactly, then remove it
        shell: bash
        run: |
          set -Eeuo pipefail
          tag_ref="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$OLD_RELEASE_TAG")"
          object_type="$(jq -r '.object.type' <<<"$tag_ref")"
          object_sha="$(jq -r '.object.sha' <<<"$tag_ref")"
          while test "$object_type" = "tag"; do
            tag_object="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$object_sha")"
            object_type="$(jq -r '.object.type' <<<"$tag_object")"
            object_sha="$(jq -r '.object.sha' <<<"$tag_object")"
          done
          test "$object_type" = "commit"
          test "$object_sha" = "$OLD_MAIN_SHA"

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$OLD_RELEASE_TAG" > "$RUNNER_TEMP/v2-release.json"
          test "$(jq -r '.tag_name' "$RUNNER_TEMP/v2-release.json")" = "$OLD_RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/v2-release.json")" = "$OLD_RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/v2-release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/v2-release.json")" = "false"

          mapfile -t assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/v2-release.json" | sort -u)
          mapfile -t expected < <(printf '%s\n' "$ARCHIVE_NAME" "$SIDECAR_NAME" | sort -u)
          test "$(printf '%s\n' "${assets[@]}")" = "$(printf '%s\n' "${expected[@]}")"

          mkdir -p "$RUNNER_TEMP/v2-assets"
          for asset in "${expected[@]}"; do
            asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/v2-release.json")"
            gh api -H 'Accept: application/octet-stream' \
              "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" > "$RUNNER_TEMP/v2-assets/$asset"
          done
          test "$(sha256sum "$RUNNER_TEMP/v2-assets/$ARCHIVE_NAME" | awk '{print $1}')" = "$OLD_SHA256"
          printf '%s  %s\n' "$OLD_SHA256" "$ARCHIVE_NAME" > "$RUNNER_TEMP/expected-v2.sha256"
          cmp --silent "$RUNNER_TEMP/expected-v2.sha256" "$RUNNER_TEMP/v2-assets/$SIDECAR_NAME"
          (cd "$RUNNER_TEMP/v2-assets" && sha256sum --check "$SIDECAR_NAME")

          release_id="$(jq -r '.id' "$RUNNER_TEMP/v2-release.json")"
          gh api --method DELETE "repos/$EXPECTED_REPOSITORY/releases/$release_id"
          gh api --method DELETE "repos/$EXPECTED_REPOSITORY/git/refs/tags/$OLD_RELEASE_TAG"
          test "$(gh api --paginate "repos/$EXPECTED_REPOSITORY/releases?per_page=100" \
            --jq '[.[] | select(.tag_name == "v2.0.0")] | length')" = "0"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/matching-refs/tags/v2.0.0" --jq 'length')" = "0"

      - name: Reverify v1 and main, then remove only approved temporary branches
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')" = "$EXPECTED_MAIN_SHA"
          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/final-v1.json"
          test "$(jq -r '.name' "$RUNNER_TEMP/final-v1.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/final-v1.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/final-v1.json")" = "false"

          for branch in \
            feat/v1-template-first \
            release/v1.0.0-finalize \
            release/v1.0.0-finalize-assets \
            release/v1.0.0-readability \
            release/v1.0.0-release-only
          do
            gh api --method DELETE "repos/$EXPECTED_REPOSITORY/git/refs/heads/$branch"
          done

          gh api --method PATCH \
            "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER" \
            -f state=closed >/dev/null
          gh api --method DELETE \
            "repos/$EXPECTED_REPOSITORY/git/refs/heads/$EXPECTED_HEAD_BRANCH"

          mapfile -t remaining < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" \
              --jq '.[].name' | sort -u
          )
          test "$(printf '%s\n' "${remaining[@]}")" = "main"

      - name: Record final receipt
        if: success()
        shell: bash
        run: |
          {
            echo "# AWS Codex Fastlane v1.0.0 finalized"
            echo
            echo "- Main: \`$EXPECTED_MAIN_SHA\`"
            echo "- Release: \`$RELEASE_TAG\`"
            echo "- SHA-256: \`$EXPECTED_SHA256\`"
            echo "- Superseded release removed: \`$OLD_RELEASE_TAG\`"
            echo "- Remaining branches: \`main\`"
            echo "- Repository template setting: pending separate admin verification"
          } >> "$GITHUB_STEP_SUMMARY"