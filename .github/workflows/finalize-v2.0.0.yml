name: Finalize AWS Codex Fastlane v2.0.0

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: finalize-aws-codex-fastlane-v2.0.0
  cancel-in-progress: false

permissions:
  contents: read

env:
  EXPECTED_REPOSITORY: Levi-Breedlove/aws-bootstrap
  EXPECTED_MAIN_SHA: 5b8989195119e539e5259cab0bd63a3ee83df620
  EXPECTED_HEAD_BRANCH: release/v2.0.0-packaging
  RELEASE_TAG: v2.0.0
  RELEASE_TITLE: AWS Codex Fastlane v2.0.0
  RELEASE_ARCHIVE: aws-codex-fastlane-bootstrap.zip
  RELEASE_SIDECAR: aws-codex-fastlane-bootstrap.zip.sha256
  EXPECTED_SHA256: 4f6e3f4b93550fc15ea40561f6800e96da5242f2f9504e4b3b1e59fda0eb53a0

jobs:
  validate:
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v2.0.0-packaging'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out the reviewed main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify immutable release inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(tr -d '\r\n' < VERSION)" = "2.0.0"
          test "$(sha256sum "$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$RELEASE_ARCHIVE" > "$RUNNER_TEMP/expected.sha256"
          cmp --silent "$RUNNER_TEMP/expected.sha256" "$RELEASE_SIDECAR"
          sha256sum --check "$RELEASE_SIDECAR"

      - name: Run maintainer safety tests
        run: python -m unittest discover -s tests -v

      - name: Verify deterministic release package
        run: python scripts/package_release.py --check

  finalize:
    needs:
      - validate
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v2.0.0-packaging'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out the reviewed main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          persist-credentials: false

      - name: Revalidate repository and authorization envelope
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"

          test "$(gh api "repos/$EXPECTED_REPOSITORY" --jq '.default_branch')" = "main"

          mapfile -t pr_files < <(
            gh api --paginate \
              "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename' | sort -u
          )
          test "${#pr_files[@]}" -eq 1
          test "${pr_files[0]}" = ".github/workflows/finalize-v2.0.0.yml"

          live_main="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$live_main" = "$EXPECTED_MAIN_SHA"

          live_head="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_HEAD_BRANCH" --jq '.object.sha')"
          test "$live_head" = "$EVENT_HEAD_SHA"

          mapfile -t actual_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          allowed_branches=(
            agent/bootstrap-safety-foundation
            agent/fastlane-autonomous-construction
            agent/fastlane-intake-gates
            agent/prefer-aws-core-plugin
            agent/use-aws-core-in-codex-prompts
            main
            release/v2.0.0-packaging
          )
          mapfile -t allowed_sorted < <(printf '%s\n' "${allowed_branches[@]}" | sort -u)
          unexpected="$(comm -23 \
            <(printf '%s\n' "${actual_branches[@]}") \
            <(printf '%s\n' "${allowed_sorted[@]}") \
          )"
          test -z "$unexpected" || {
            printf 'Unexpected branch or branches:\n%s\n' "$unexpected" >&2
            exit 1
          }
          printf '%s\n' "${actual_branches[@]}" | grep -Fxq main
          printf '%s\n' "${actual_branches[@]}" | grep -Fxq "$EXPECTED_HEAD_BRANCH"

          for branch in "${actual_branches[@]}"; do
            if test "$branch" != "main"; then
              test "$(gh api "repos/$EXPECTED_REPOSITORY/branches/$branch" --jq '.protected')" = "false"
            fi
          done

          declare -A approved_cleanup_tips=(
            [agent/bootstrap-safety-foundation]=37ab4d68517f1ea0d408a3ae007f27eb77cf03d0
            [agent/fastlane-autonomous-construction]=6157bd88c538971487cdf614c6e6791b5ef2dddc
            [agent/fastlane-intake-gates]=08b6a27c0257de5a405f247c6401eee5918aae17
            [agent/prefer-aws-core-plugin]=723f3efafb9078542eb05fc511a478d5f289e5f1
            [agent/use-aws-core-in-codex-prompts]=585e7c5beb61ebb48c470e8755119d8918222837
          )
          for branch in "${!approved_cleanup_tips[@]}"; do
            if printf '%s\n' "${actual_branches[@]}" | grep -Fxq "$branch"; then
              live_tip="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$branch" --jq '.object.sha')"
              test "$live_tip" = "${approved_cleanup_tips[$branch]}" || {
                echo "Approved cleanup branch moved: $branch" >&2
                exit 1
              }
            fi
          done

          test "$(tr -d '\r\n' < VERSION)" = "2.0.0"
          test "$(sha256sum "$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$RELEASE_ARCHIVE" > "$RUNNER_TEMP/expected.sha256"
          cmp --silent "$RUNNER_TEMP/expected.sha256" "$RELEASE_SIDECAR"

      - name: Build exact v2.0.0 release notes
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          marker = "## [2.0.0] - 2026-07-17"
          start = changelog.find(marker)
          if start < 0:
              raise SystemExit("v2.0.0 changelog section is missing")
          next_section = changelog.find("\n## [", start + len(marker))
          section = changelog[start:] if next_section < 0 else changelog[start:next_section]
          notes_path = Path(os.environ["RUNNER_TEMP"]) / "release-notes.md"
          notes_path.write_text(section.strip() + "\n", encoding="utf-8")
          PY

      - name: Create or verify annotated tag and release
        shell: bash
        run: |
          set -Eeuo pipefail

          peel_tag() {
            local object_type object_sha payload
            payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
            object_type="$(jq -r '.object.type' <<<"$payload")"
            object_sha="$(jq -r '.object.sha' <<<"$payload")"
            while test "$object_type" = "tag"; do
              payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -r '.object.type' <<<"$payload")"
              object_sha="$(jq -r '.object.sha' <<<"$payload")"
            done
            test "$object_type" = "commit"
            printf '%s\n' "$object_sha"
          }

          api_probe() {
            local response rc
            set +e
            response="$(gh api --include "$1" 2>&1)"
            rc=$?
            set -e
            if test "$rc" -eq 0; then
              return 0
            fi
            if grep -Eq '(^HTTP/[^ ]+ 404 |HTTP 404:|"status"[[:space:]]*:[[:space:]]*"?404"?)' <<<"$response"; then
              return 44
            fi
            printf '%s\n' "$response" >&2
            return "$rc"
          }

          tag_endpoint="repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG"
          if api_probe "$tag_endpoint"; then
            tag_type="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG" --jq '.object.type')"
            test "$tag_type" = "tag" || {
              echo "Existing v2.0.0 ref is not an annotated tag; refusing to replace it." >&2
              exit 1
            }
            test "$(peel_tag)" = "$EXPECTED_MAIN_SHA"
          else
            probe_status=$?
            test "$probe_status" -eq 44 || exit "$probe_status"
            tag_object_sha="$(gh api --method POST \
              "repos/$EXPECTED_REPOSITORY/git/tags" \
              -f tag="$RELEASE_TAG" \
              -f message="$RELEASE_TITLE" \
              -f object="$EXPECTED_MAIN_SHA" \
              -f type=commit \
              --jq '.sha')"
            gh api --method POST \
              "repos/$EXPECTED_REPOSITORY/git/refs" \
              -f ref="refs/tags/$RELEASE_TAG" \
              -f sha="$tag_object_sha" >/dev/null
            test "$(peel_tag)" = "$EXPECTED_MAIN_SHA"
          fi

          release_endpoint="repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG"
          if api_probe "$release_endpoint"; then
            :
          else
            probe_status=$?
            test "$probe_status" -eq 44 || exit "$probe_status"
            gh release create "$RELEASE_TAG" \
              --repo "$EXPECTED_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --draft \
              --verify-tag
          fi
          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release.json"

          test "$(jq -r '.tag_name' "$RUNNER_TEMP/release.json")" = "$RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/release.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/release.json")" = "false"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          release = json.loads((Path(os.environ["RUNNER_TEMP"]) / "release.json").read_text(encoding="utf-8"))
          expected = (Path(os.environ["RUNNER_TEMP"]) / "release-notes.md").read_text(encoding="utf-8")
          actual = release.get("body") or ""
          if actual.replace("\r\n", "\n").strip() != expected.replace("\r\n", "\n").strip():
              raise SystemExit("Existing release notes differ from the reviewed v2.0.0 changelog section")
          PY

          mapfile -t expected_assets < <(printf '%s\n' "$RELEASE_ARCHIVE" "$RELEASE_SIDECAR" | sort -u)
          mapfile -t existing_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/release.json" | sort -u)
          unexpected_assets="$(comm -23 \
            <(printf '%s\n' "${existing_assets[@]}") \
            <(printf '%s\n' "${expected_assets[@]}") \
          )"
          test -z "$unexpected_assets" || {
            printf 'Unexpected release asset or assets:\n%s\n' "$unexpected_assets" >&2
            exit 1
          }

          release_is_draft="$(jq -r '.draft' "$RUNNER_TEMP/release.json")"
          asset_check_dir="$RUNNER_TEMP/current-assets"
          rm -rf "$asset_check_dir"
          mkdir -p "$asset_check_dir"

          for asset in "${expected_assets[@]}"; do
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "$asset"; then
              asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/release.json")"
              gh api \
                -H 'Accept: application/octet-stream' \
                "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" \
                > "$asset_check_dir/$asset"
              cmp --silent "$asset_check_dir/$asset" "$asset"
            else
              test "$release_is_draft" = "true" || {
                echo "Published release is missing expected asset: $asset" >&2
                exit 1
              }
              gh release upload "$RELEASE_TAG" "$asset" --repo "$EXPECTED_REPOSITORY"
            fi
          done

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release.json"
          mapfile -t actual_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/release.json" | sort -u)
          test "$(printf '%s\n' "${actual_assets[@]}")" = "$(printf '%s\n' "${expected_assets[@]}")"

          for asset in "${expected_assets[@]}"; do
            expected_size="$(stat -c '%s' "$asset")"
            actual_size="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .size' "$RUNNER_TEMP/release.json")"
            test "$actual_size" = "$expected_size"
            expected_digest="sha256:$(sha256sum "$asset" | awk '{print $1}')"
            actual_digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' "$RUNNER_TEMP/release.json")"
            test "$actual_digest" = "$expected_digest"
            test "$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .state' "$RUNNER_TEMP/release.json")" = "uploaded"
          done

          draft_check_dir="$RUNNER_TEMP/draft-assets"
          rm -rf "$draft_check_dir"
          mkdir -p "$draft_check_dir"
          for asset in "${expected_assets[@]}"; do
            asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/release.json")"
            gh api \
              -H 'Accept: application/octet-stream' \
              "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" \
              > "$draft_check_dir/$asset"
            cmp --silent "$draft_check_dir/$asset" "$asset"
          done

          if test "$release_is_draft" = "true"; then
            gh release edit "$RELEASE_TAG" \
              --repo "$EXPECTED_REPOSITORY" \
              --draft=false
          fi

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/release.json"
          test "$(jq -r '.draft' "$RUNNER_TEMP/release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/release.json")" = "false"
          test "$(peel_tag)" = "$EXPECTED_MAIN_SHA"

      - name: Independently verify published assets
        shell: bash
        run: |
          set -Eeuo pipefail
          published="$RUNNER_TEMP/published"
          mkdir -p "$published"
          gh release download "$RELEASE_TAG" \
            --repo "$EXPECTED_REPOSITORY" \
            --pattern "$RELEASE_ARCHIVE" \
            --pattern "$RELEASE_SIDECAR" \
            --dir "$published"
          cmp --silent "$published/$RELEASE_ARCHIVE" "$RELEASE_ARCHIVE"
          test "$(sha256sum "$published/$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          cmp --silent "$published/$RELEASE_SIDECAR" "$RELEASE_SIDECAR"
          (cd "$published" && sha256sum --check "$RELEASE_SIDECAR")

      - name: Delete only approved branches and close the temporary PR
        shell: bash
        run: |
          set -Eeuo pipefail

          live_main="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$live_main" = "$EXPECTED_MAIN_SHA"

          tag_payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          test "$(jq -r '.object.type' <<<"$tag_payload")" = "tag"
          tag_object_sha="$(jq -r '.object.sha' <<<"$tag_payload")"
          tag_object="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$tag_object_sha")"
          test "$(jq -r '.object.type' <<<"$tag_object")" = "commit"
          test "$(jq -r '.object.sha' <<<"$tag_object")" = "$EXPECTED_MAIN_SHA"

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/final-release.json"
          test "$(jq -r '.tag_name' "$RUNNER_TEMP/final-release.json")" = "$RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/final-release.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/final-release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/final-release.json")" = "false"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"])
          release = json.loads((root / "final-release.json").read_text(encoding="utf-8"))
          expected = (root / "release-notes.md").read_text(encoding="utf-8")
          actual = release.get("body") or ""
          if actual.replace("\r\n", "\n").strip() != expected.replace("\r\n", "\n").strip():
              raise SystemExit("Published release notes no longer match the reviewed changelog section")
          PY
          mapfile -t final_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/final-release.json" | sort -u)
          mapfile -t expected_assets < <(printf '%s\n' "$RELEASE_ARCHIVE" "$RELEASE_SIDECAR" | sort -u)
          test "$(printf '%s\n' "${final_assets[@]}")" = "$(printf '%s\n' "${expected_assets[@]}")"

          mapfile -t current_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          allowed_branches=(
            agent/bootstrap-safety-foundation
            agent/fastlane-autonomous-construction
            agent/fastlane-intake-gates
            agent/prefer-aws-core-plugin
            agent/use-aws-core-in-codex-prompts
            main
            release/v2.0.0-packaging
          )
          mapfile -t allowed_sorted < <(printf '%s\n' "${allowed_branches[@]}" | sort -u)
          test -z "$(comm -23 \
            <(printf '%s\n' "${current_branches[@]}") \
            <(printf '%s\n' "${allowed_sorted[@]}") \
          )"
          printf '%s\n' "${current_branches[@]}" | grep -Fxq main
          printf '%s\n' "${current_branches[@]}" | grep -Fxq "$EXPECTED_HEAD_BRANCH"

          for asset in "${expected_assets[@]}"; do
            expected_size="$(stat -c '%s' "$asset")"
            actual_size="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .size' "$RUNNER_TEMP/final-release.json")"
            test "$actual_size" = "$expected_size"
            expected_digest="sha256:$(sha256sum "$asset" | awk '{print $1}')"
            actual_digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' "$RUNNER_TEMP/final-release.json")"
            test "$actual_digest" = "$expected_digest"
            test "$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .state' "$RUNNER_TEMP/final-release.json")" = "uploaded"
          done

          declare -A approved_cleanup_tips=(
            [agent/bootstrap-safety-foundation]=37ab4d68517f1ea0d408a3ae007f27eb77cf03d0
            [agent/fastlane-autonomous-construction]=6157bd88c538971487cdf614c6e6791b5ef2dddc
            [agent/fastlane-intake-gates]=08b6a27c0257de5a405f247c6401eee5918aae17
            [agent/prefer-aws-core-plugin]=723f3efafb9078542eb05fc511a478d5f289e5f1
            [agent/use-aws-core-in-codex-prompts]=585e7c5beb61ebb48c470e8755119d8918222837
          )
          for branch in "${!approved_cleanup_tips[@]}"; do
            if printf '%s\n' "${current_branches[@]}" | grep -Fxq "$branch"; then
              live_tip="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$branch" --jq '.object.sha')"
              test "$live_tip" = "${approved_cleanup_tips[$branch]}" || {
                echo "Approved cleanup branch moved before deletion: $branch" >&2
                exit 1
              }
            fi
          done

          cleanup_branches=(
            agent/bootstrap-safety-foundation
            agent/fastlane-autonomous-construction
            agent/fastlane-intake-gates
            agent/prefer-aws-core-plugin
            agent/use-aws-core-in-codex-prompts
          )
          for branch in "${cleanup_branches[@]}"; do
            if printf '%s\n' "${current_branches[@]}" | grep -Fxq "$branch"; then
              gh api --method DELETE "repos/$EXPECTED_REPOSITORY/git/refs/heads/$branch"
            fi
          done

          mapfile -t before_self_delete < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          test "$(printf '%s\n' "${before_self_delete[@]}")" = "$(printf '%s\n' main "$EXPECTED_HEAD_BRANCH" | sort)"

          gh api --method PATCH \
            "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER" \
            -f state=closed >/dev/null

          gh api --method DELETE \
            "repos/$EXPECTED_REPOSITORY/git/refs/heads/$EXPECTED_HEAD_BRANCH"

          mapfile -t remaining_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          test "$(printf '%s\n' "${remaining_branches[@]}")" = "main"

      - name: Record final receipt
        if: success()
        shell: bash
        run: |
          {
            echo "# AWS Codex Fastlane v2.0.0 finalized"
            echo
            echo "- Main: \`$EXPECTED_MAIN_SHA\`"
            echo "- Tag: \`$RELEASE_TAG\` (annotated, peeled to main)"
            echo "- Release assets: \`$RELEASE_ARCHIVE\`, \`$RELEASE_SIDECAR\`"
            echo "- SHA-256: \`$EXPECTED_SHA256\`"
            echo "- Remaining branches: \`main\`"
          } >> "$GITHUB_STEP_SUMMARY"

