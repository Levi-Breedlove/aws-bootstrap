name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  safety-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run maintainer safety tests
        run: python -m unittest discover -s tests -v

      - name: Render instruction-only setup status
        run: python scripts/setup_assistant.py status --root . --json

      - name: Verify template manifest hashes
        run: python scripts/update_manifest.py --check

      - name: Verify deterministic release package
        run: python scripts/package_release.py --check

  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run Windows safety tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Verify deterministic Windows setup states and owner guide
        shell: pwsh
        run: |
          @'
          import importlib.util
          from pathlib import Path

          script = Path("scripts/setup_assistant.py")
          spec = importlib.util.spec_from_file_location("setup_assistant", script)
          if spec is None or spec.loader is None:
              raise RuntimeError("Unable to load setup assistant")
          setup = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(setup)

          base = {
              "repository_ready": True,
              "dependencies_ready": True,
              "doctor_passed": True,
              "git_available": True,
              "python_available": True,
              "fastlane_python_command": "python",
              "python_version_supported": True,
              "system": "WINDOWS",
              "surface": "CODEX_CLI",
              "unknown_plugin_sources": [],
          }

          missing_aws_core = setup.reduce_setup(base)
          assert missing_aws_core["state"] == "READY_FOR_INTAKE"
          assert missing_aws_core["aws_core_status"] == "DEFERRED_UNTIL_DESIGN"

          official = dict(base)
          official.update({
              "official_plugin_enabled": True,
              "official_plugin_loaded_in_session": True,
              "official_plugin_source_verified": True,
              "observed_marketplace_repository": setup.OFFICIAL_AWS_MARKETPLACE,
              "observed_plugin_source": setup.OFFICIAL_AWS_MARKETPLACE_NAME,
              "observed_plugin_identity": setup.OFFICIAL_AWS_CORE_IDENTITY,
          })
          available = setup.reduce_setup(official)
          assert available["state"] == "READY_FOR_INTAKE"
          assert available["aws_core_status"] == "AVAILABLE"

          guide = setup.render_guide(setup.build_guide(Path("."), system="Windows"))
          for required in (
              "winget install --id astral-sh.uv",
              "codex plugin marketplace add aws/agent-toolkit-for-aws",
              "owner-run instructions",
          ):
              assert required in guide, f"Windows setup guide omitted: {required}"
          '@ | python -

      - name: Render Windows instruction-only setup status
        shell: pwsh
        run: python .\scripts\setup_assistant.py status --root . --json

      - name: Verify manifest and release package
        shell: pwsh
        run: |
          python .\scripts\update_manifest.py --check
          python .\scripts\package_release.py --check

  macos-setup-smoke:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run macOS safety tests
        run: python -m unittest discover -s tests -v

      - name: Run extracted release and doctor smoke
        run: >-
          python -m unittest
          tests.test_package_release.PackageReleaseTests.test_extracted_release_configures_in_place_and_passes_doctor
          -v

      - name: Render macOS instruction-only setup status
        run: python scripts/setup_assistant.py status --root . --json

      - name: Verify macOS manifest and release package
        run: |
          python scripts/update_manifest.py --check
          python scripts/package_release.py --check
