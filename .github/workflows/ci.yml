name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  safety-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run maintainer safety tests
        run: python -m unittest discover -s tests -v

      - name: Exercise the read-only prerequisite CLI
        run: python scripts/setup_assistant.py prerequisites --root . --json || test $? -eq 1

      - name: Verify template manifest hashes
        run: python scripts/update_manifest.py --check

      - name: Verify deterministic release package
        run: python scripts/package_release.py --check

  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run Windows safety tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Verify deterministic Windows and WSL prerequisite rendering
        shell: pwsh
        run: >-
          python -m unittest
          tests.test_setup_assistant.SetupAssistantTests.test_windows_prefers_supported_python3_when_python_is_old
          tests.test_setup_assistant.SetupAssistantTests.test_wsl1_is_unsupported_and_wsl2_requires_bubblewrap
          tests.test_setup_assistant.SetupAssistantTests.test_platform_specific_checklists_are_exact_and_owner_run
          -v

      - name: Exercise the Windows read-only prerequisite CLI
        shell: pwsh
        run: |
          python .\scripts\setup_assistant.py prerequisites --root . --json
          if ($LASTEXITCODE -notin 0, 1) { exit $LASTEXITCODE }

      - name: Verify manifest and release package
        shell: pwsh
        run: |
          python .\scripts\update_manifest.py --check
          python .\scripts\package_release.py --check

  macos-setup-smoke:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run macOS safety tests
        run: python -m unittest discover -s tests -v

      - name: Run extracted release and doctor smoke
        run: >-
          python -m unittest
          tests.test_package_release.PackageReleaseTests.test_extracted_release_configures_in_place_and_passes_doctor
          -v

      - name: Exercise the macOS read-only prerequisite CLI
        run: python scripts/setup_assistant.py prerequisites --root . --json || test $? -eq 1

      - name: Verify macOS manifest and release package
        run: |
          python scripts/update_manifest.py --check
          python scripts/package_release.py --check
