name: Finalize AWS Codex Fastlane v1.0.0

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: finalize-aws-codex-fastlane-v1.0.0
  cancel-in-progress: false

permissions:
  contents: read

env:
  EXPECTED_REPOSITORY: Levi-Breedlove/aws-bootstrap
  EXPECTED_MAIN_SHA: c050a636f86f06811a0688ad6fd51bdba26cb4ce
  EXPECTED_HEAD_BRANCH: release/v1.0.0-finalize
  EXPECTED_IMPLEMENTATION_BRANCH: release/v1.0.0-readability
  EXPECTED_IMPLEMENTATION_SHA: 7f37518fd39e1a4d786debe63d999ceeb8b40cd5
  RELEASE_TAG: v1.0.0
  RELEASE_TITLE: AWS Codex Fastlane v1.0.0
  RELEASE_ARCHIVE: aws-codex-fastlane-bootstrap.zip
  RELEASE_SIDECAR: aws-codex-fastlane-bootstrap.zip.sha256
  EXPECTED_SHA256: 943463fda2315ac2f515445023b79da402fd786db0c0c5972828527537de1fd8
  OLD_RELEASE_TAG: v2.0.0
  OLD_RELEASE_TITLE: AWS Codex Fastlane v2.0.0
  OLD_MAIN_SHA: 5b8989195119e539e5259cab0bd63a3ee83df620
  OLD_SHA256: 4f6e3f4b93550fc15ea40561f6800e96da5242f2f9504e4b3b1e59fda0eb53a0

jobs:
  validate:
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v1.0.0-finalize'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out the corrected main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify immutable v1 release inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(tr -d '\r\n' < VERSION)" = "1.0.0"
          test "$(sha256sum "$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$RELEASE_ARCHIVE" > "$RUNNER_TEMP/expected.sha256"
          cmp --silent "$RUNNER_TEMP/expected.sha256" "$RELEASE_SIDECAR"
          sha256sum --check "$RELEASE_SIDECAR"

      - name: Run maintainer safety tests
        run: python -m unittest discover -s tests -v

      - name: Verify deterministic release package
        run: python scripts/package_release.py --check

  finalize:
    needs:
      - validate
    if: >-
      github.repository == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.repo.full_name == 'Levi-Breedlove/aws-bootstrap' &&
      github.event.pull_request.head.ref == 'release/v1.0.0-finalize'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out the corrected main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_MAIN_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate repository and authorization envelope
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY"
          test "$(git rev-parse HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(gh api "repos/$EXPECTED_REPOSITORY" --jq '.default_branch')" = "main"

          mapfile -t pr_files < <(
            gh api --paginate \
              "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename' | sort -u
          )
          test "${#pr_files[@]}" -eq 1
          test "${pr_files[0]}" = ".github/workflows/finalize-v1.0.0.yml"

          live_main="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$live_main" = "$EXPECTED_MAIN_SHA"
          live_head="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_HEAD_BRANCH" --jq '.object.sha')"
          test "$live_head" = "$EVENT_HEAD_SHA"
          live_implementation="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_IMPLEMENTATION_BRANCH" --jq '.object.sha')"
          test "$live_implementation" = "$EXPECTED_IMPLEMENTATION_SHA"

          mapfile -t actual_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          mapfile -t expected_branches < <(
            printf '%s\n' \
              main \
              "$EXPECTED_HEAD_BRANCH" \
              "$EXPECTED_IMPLEMENTATION_BRANCH" | sort -u
          )
          test "$(printf '%s\n' "${actual_branches[@]}")" = "$(printf '%s\n' "${expected_branches[@]}")"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/branches/$EXPECTED_HEAD_BRANCH" --jq '.protected')" = "false"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/branches/$EXPECTED_IMPLEMENTATION_BRANCH" --jq '.protected')" = "false"

          test "$(tr -d '\r\n' < VERSION)" = "1.0.0"
          test "$(sha256sum "$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$RELEASE_ARCHIVE" > "$RUNNER_TEMP/expected.sha256"
          cmp --silent "$RUNNER_TEMP/expected.sha256" "$RELEASE_SIDECAR"
          sha256sum --check "$RELEASE_SIDECAR"

      - name: Build exact v1.0.0 release notes
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          marker = "## [1.0.0] - 2026-07-17"
          start = changelog.find(marker)
          if start < 0:
              raise SystemExit("v1.0.0 changelog section is missing")
          next_section = changelog.find("\n## [", start + len(marker))
          section = changelog[start:] if next_section < 0 else changelog[start:next_section]
          notes_path = Path(os.environ["RUNNER_TEMP"]) / "release-notes.md"
          notes_path.write_text(section.strip() + "\n", encoding="utf-8")
          PY

      - name: Create, verify, and publish v1.0.0
        shell: bash
        run: |
          set -Eeuo pipefail

          is_404() {
            grep -Eq '(^HTTP/[^ ]+ 404 |HTTP 404:|Not Found.*404|"status"[[:space:]]*:[[:space:]]*"?404"?)' "$1"
          }

          peel_tag() {
            local tag="$1" object_type object_sha payload
            payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$tag")"
            object_type="$(jq -r '.object.type' <<<"$payload")"
            object_sha="$(jq -r '.object.sha' <<<"$payload")"
            while test "$object_type" = "tag"; do
              payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -r '.object.type' <<<"$payload")"
              object_sha="$(jq -r '.object.sha' <<<"$payload")"
            done
            test "$object_type" = "commit"
            printf '%s\n' "$object_sha"
          }

          load_release() {
            local tag="$1" output="$2" graph="$RUNNER_TEMP/releases-graphql.json"
            gh api graphql \
              -F owner=Levi-Breedlove \
              -F name=aws-bootstrap \
              -f query='query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  releases(first: 100, orderBy: {field: CREATED_AT, direction: DESC}) {
                    nodes { databaseId name tagName isDraft isPrerelease }
                  }
                }
              }' > "$graph"
            jq --arg tag "$tag" \
              '[.data.repository.releases.nodes[] | select(.tagName == $tag)]' \
              "$graph" > "$RUNNER_TEMP/release-matches.json"
            local count release_id
            count="$(jq 'length' "$RUNNER_TEMP/release-matches.json")"
            if test "$count" -eq 0; then
              return 44
            fi
            test "$count" -eq 1
            release_id="$(jq -r '.[0].databaseId' "$RUNNER_TEMP/release-matches.json")"
            test "$release_id" != "null"
            gh api "repos/$EXPECTED_REPOSITORY/releases/$release_id" > "$output"
          }

          tag_error="$RUNNER_TEMP/v1-tag-error.txt"
          if gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG" > "$RUNNER_TEMP/v1-tag-ref.json" 2>"$tag_error"; then
            test "$(jq -r '.object.type' "$RUNNER_TEMP/v1-tag-ref.json")" = "tag" || {
              echo "Existing v1.0.0 ref is not an annotated tag; refusing to replace it." >&2
              exit 1
            }
            test "$(peel_tag "$RELEASE_TAG")" = "$EXPECTED_MAIN_SHA"
          else
            rc=$?
            is_404 "$tag_error" || { cat "$tag_error" >&2; exit "$rc"; }
            tag_object_sha="$(gh api --method POST \
              "repos/$EXPECTED_REPOSITORY/git/tags" \
              -f tag="$RELEASE_TAG" \
              -f message="$RELEASE_TITLE" \
              -f object="$EXPECTED_MAIN_SHA" \
              -f type=commit \
              --jq '.sha')"
            gh api --method POST \
              "repos/$EXPECTED_REPOSITORY/git/refs" \
              -f ref="refs/tags/$RELEASE_TAG" \
              -f sha="$tag_object_sha" >/dev/null
            test "$(peel_tag "$RELEASE_TAG")" = "$EXPECTED_MAIN_SHA"
          fi

          if load_release "$RELEASE_TAG" "$RUNNER_TEMP/v1-release.json"; then
            :
          else
            rc=$?
            test "$rc" -eq 44 || exit "$rc"
            gh release create "$RELEASE_TAG" \
              "$RELEASE_ARCHIVE" \
              "$RELEASE_SIDECAR" \
              --repo "$EXPECTED_REPOSITORY" \
              --verify-tag \
              --draft \
              --title "$RELEASE_TITLE" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
            load_release "$RELEASE_TAG" "$RUNNER_TEMP/v1-release.json"
          fi

          test "$(jq -r '.tag_name' "$RUNNER_TEMP/v1-release.json")" = "$RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/v1-release.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/v1-release.json")" = "false"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"])
          release = json.loads((root / "v1-release.json").read_text(encoding="utf-8"))
          expected = (root / "release-notes.md").read_text(encoding="utf-8")
          actual = release.get("body") or ""
          if actual.replace("\r\n", "\n").strip() != expected.replace("\r\n", "\n").strip():
              raise SystemExit("v1.0.0 release notes differ from the reviewed changelog section")
          PY

          mapfile -t expected_assets < <(printf '%s\n' "$RELEASE_ARCHIVE" "$RELEASE_SIDECAR" | sort -u)
          mapfile -t existing_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/v1-release.json" | sort -u)
          unexpected_assets="$(comm -23 \
            <(printf '%s\n' "${existing_assets[@]}") \
            <(printf '%s\n' "${expected_assets[@]}") \
          )"
          test -z "$unexpected_assets" || {
            printf 'Unexpected v1 asset or assets:\n%s\n' "$unexpected_assets" >&2
            exit 1
          }

          release_is_draft="$(jq -r '.draft' "$RUNNER_TEMP/v1-release.json")"
          v1_check="$RUNNER_TEMP/v1-draft-assets"
          mkdir -p "$v1_check"
          for asset in "${expected_assets[@]}"; do
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "$asset"; then
              asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/v1-release.json")"
              gh api -H 'Accept: application/octet-stream' \
                "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" > "$v1_check/$asset"
              cmp --silent "$v1_check/$asset" "$asset"
            else
              test "$release_is_draft" = "true"
              gh release upload "$RELEASE_TAG" "$asset" --repo "$EXPECTED_REPOSITORY"
            fi
          done

          load_release "$RELEASE_TAG" "$RUNNER_TEMP/v1-release.json"
          mapfile -t actual_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/v1-release.json" | sort -u)
          test "$(printf '%s\n' "${actual_assets[@]}")" = "$(printf '%s\n' "${expected_assets[@]}")"
          for asset in "${expected_assets[@]}"; do
            expected_size="$(stat -c '%s' "$asset")"
            actual_size="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .size' "$RUNNER_TEMP/v1-release.json")"
            test "$actual_size" = "$expected_size"
            expected_digest="sha256:$(sha256sum "$asset" | awk '{print $1}')"
            actual_digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' "$RUNNER_TEMP/v1-release.json")"
            test "$actual_digest" = "$expected_digest"
            test "$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .state' "$RUNNER_TEMP/v1-release.json")" = "uploaded"
          done

          if test "$(jq -r '.draft' "$RUNNER_TEMP/v1-release.json")" = "true"; then
            gh release edit "$RELEASE_TAG" --repo "$EXPECTED_REPOSITORY" --draft=false
          fi
          load_release "$RELEASE_TAG" "$RUNNER_TEMP/v1-release.json"
          test "$(jq -r '.draft' "$RUNNER_TEMP/v1-release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/v1-release.json")" = "false"
          test "$(peel_tag "$RELEASE_TAG")" = "$EXPECTED_MAIN_SHA"

      - name: Independently download and verify published v1 assets
        shell: bash
        run: |
          set -Eeuo pipefail
          published="$RUNNER_TEMP/v1-published"
          mkdir -p "$published"
          gh release download "$RELEASE_TAG" \
            --repo "$EXPECTED_REPOSITORY" \
            --pattern "$RELEASE_ARCHIVE" \
            --pattern "$RELEASE_SIDECAR" \
            --dir "$published"
          cmp --silent "$published/$RELEASE_ARCHIVE" "$RELEASE_ARCHIVE"
          cmp --silent "$published/$RELEASE_SIDECAR" "$RELEASE_SIDECAR"
          test "$(sha256sum "$published/$RELEASE_ARCHIVE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          (cd "$published" && sha256sum --check "$RELEASE_SIDECAR")

      - name: Verify exact v2 publication, then remove its release and tag
        shell: bash
        run: |
          set -Eeuo pipefail

          peel_tag() {
            local tag="$1" object_type object_sha payload
            payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$tag")"
            object_type="$(jq -r '.object.type' <<<"$payload")"
            object_sha="$(jq -r '.object.sha' <<<"$payload")"
            while test "$object_type" = "tag"; do
              payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$object_sha")"
              object_type="$(jq -r '.object.type' <<<"$payload")"
              object_sha="$(jq -r '.object.sha' <<<"$payload")"
            done
            test "$object_type" = "commit"
            printf '%s\n' "$object_sha"
          }

          old_tag_ref="$RUNNER_TEMP/v2-tag-ref.json"
          gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$OLD_RELEASE_TAG" > "$old_tag_ref"
          test "$(jq -r '.object.type' "$old_tag_ref")" = "tag"
          test "$(peel_tag "$OLD_RELEASE_TAG")" = "$OLD_MAIN_SHA"

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$OLD_RELEASE_TAG" > "$RUNNER_TEMP/v2-release.json"
          test "$(jq -r '.tag_name' "$RUNNER_TEMP/v2-release.json")" = "$OLD_RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/v2-release.json")" = "$OLD_RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/v2-release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/v2-release.json")" = "false"

          mapfile -t expected_assets < <(printf '%s\n' "$RELEASE_ARCHIVE" "$RELEASE_SIDECAR" | sort -u)
          mapfile -t old_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/v2-release.json" | sort -u)
          test "$(printf '%s\n' "${old_assets[@]}")" = "$(printf '%s\n' "${expected_assets[@]}")"

          old_dir="$RUNNER_TEMP/v2-assets"
          mkdir -p "$old_dir"
          for asset in "${expected_assets[@]}"; do
            asset_id="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .id' "$RUNNER_TEMP/v2-release.json")"
            gh api -H 'Accept: application/octet-stream' \
              "repos/$EXPECTED_REPOSITORY/releases/assets/$asset_id" > "$old_dir/$asset"
            expected_size="$(stat -c '%s' "$old_dir/$asset")"
            recorded_size="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .size' "$RUNNER_TEMP/v2-release.json")"
            test "$recorded_size" = "$expected_size"
            expected_digest="sha256:$(sha256sum "$old_dir/$asset" | awk '{print $1}')"
            recorded_digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' "$RUNNER_TEMP/v2-release.json")"
            test "$recorded_digest" = "$expected_digest"
            test "$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .state' "$RUNNER_TEMP/v2-release.json")" = "uploaded"
          done

          test "$(sha256sum "$old_dir/$RELEASE_ARCHIVE" | awk '{print $1}')" = "$OLD_SHA256"
          printf '%s  %s\n' "$OLD_SHA256" "$RELEASE_ARCHIVE" > "$RUNNER_TEMP/expected-v2.sha256"
          cmp --silent "$RUNNER_TEMP/expected-v2.sha256" "$old_dir/$RELEASE_SIDECAR"
          (cd "$old_dir" && sha256sum --check "$RELEASE_SIDECAR")

          old_release_id="$(jq -r '.id' "$RUNNER_TEMP/v2-release.json")"
          test "$old_release_id" != "null"
          gh api --method DELETE "repos/$EXPECTED_REPOSITORY/releases/$old_release_id"
          gh api --method DELETE "repos/$EXPECTED_REPOSITORY/git/refs/tags/$OLD_RELEASE_TAG"

          set +e
          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$OLD_RELEASE_TAG" > /dev/null 2>"$RUNNER_TEMP/v2-release-delete-check.txt"
          release_rc=$?
          gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$OLD_RELEASE_TAG" > /dev/null 2>"$RUNNER_TEMP/v2-tag-delete-check.txt"
          tag_rc=$?
          set -e
          test "$release_rc" -ne 0
          test "$tag_rc" -ne 0
          grep -Eq 'HTTP 404:|Not Found.*404' "$RUNNER_TEMP/v2-release-delete-check.txt"
          grep -Eq 'HTTP 404:|Not Found.*404' "$RUNNER_TEMP/v2-tag-delete-check.txt"

      - name: Verify v1 remains exact, close the temporary PR, and delete only temporary branches
        shell: bash
        run: |
          set -Eeuo pipefail

          live_main="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          test "$live_main" = "$EXPECTED_MAIN_SHA"

          tag_payload="$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          test "$(jq -r '.object.type' <<<"$tag_payload")" = "tag"
          tag_object_sha="$(jq -r '.object.sha' <<<"$tag_payload")"
          tag_object="$(gh api "repos/$EXPECTED_REPOSITORY/git/tags/$tag_object_sha")"
          test "$(jq -r '.object.type' <<<"$tag_object")" = "commit"
          test "$(jq -r '.object.sha' <<<"$tag_object")" = "$EXPECTED_MAIN_SHA"

          gh api "repos/$EXPECTED_REPOSITORY/releases/tags/$RELEASE_TAG" > "$RUNNER_TEMP/final-v1-release.json"
          test "$(jq -r '.tag_name' "$RUNNER_TEMP/final-v1-release.json")" = "$RELEASE_TAG"
          test "$(jq -r '.name' "$RUNNER_TEMP/final-v1-release.json")" = "$RELEASE_TITLE"
          test "$(jq -r '.draft' "$RUNNER_TEMP/final-v1-release.json")" = "false"
          test "$(jq -r '.prerelease' "$RUNNER_TEMP/final-v1-release.json")" = "false"
          mapfile -t final_assets < <(jq -r '.assets[].name' "$RUNNER_TEMP/final-v1-release.json" | sort -u)
          mapfile -t expected_assets < <(printf '%s\n' "$RELEASE_ARCHIVE" "$RELEASE_SIDECAR" | sort -u)
          test "$(printf '%s\n' "${final_assets[@]}")" = "$(printf '%s\n' "${expected_assets[@]}")"
          for asset in "${expected_assets[@]}"; do
            expected_size="$(stat -c '%s' "$asset")"
            actual_size="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .size' "$RUNNER_TEMP/final-v1-release.json")"
            test "$actual_size" = "$expected_size"
            expected_digest="sha256:$(sha256sum "$asset" | awk '{print $1}')"
            actual_digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' "$RUNNER_TEMP/final-v1-release.json")"
            test "$actual_digest" = "$expected_digest"
          done

          mapfile -t current_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          mapfile -t expected_branches < <(
            printf '%s\n' main "$EXPECTED_HEAD_BRANCH" "$EXPECTED_IMPLEMENTATION_BRANCH" | sort -u
          )
          test "$(printf '%s\n' "${current_branches[@]}")" = "$(printf '%s\n' "${expected_branches[@]}")"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_HEAD_BRANCH" --jq '.object.sha')" = "$EVENT_HEAD_SHA"
          test "$(gh api "repos/$EXPECTED_REPOSITORY/git/ref/heads/$EXPECTED_IMPLEMENTATION_BRANCH" --jq '.object.sha')" = "$EXPECTED_IMPLEMENTATION_SHA"

          gh api --method DELETE \
            "repos/$EXPECTED_REPOSITORY/git/refs/heads/$EXPECTED_IMPLEMENTATION_BRANCH"
          gh api --method PATCH \
            "repos/$EXPECTED_REPOSITORY/pulls/$PR_NUMBER" \
            -f state=closed >/dev/null
          gh api --method DELETE \
            "repos/$EXPECTED_REPOSITORY/git/refs/heads/$EXPECTED_HEAD_BRANCH"

          mapfile -t remaining_branches < <(
            gh api --paginate "repos/$EXPECTED_REPOSITORY/branches?per_page=100" --jq '.[].name' | sort -u
          )
          test "$(printf '%s\n' "${remaining_branches[@]}")" = "main"

      - name: Record final receipt
        if: success()
        shell: bash
        run: |
          {
            echo "# AWS Codex Fastlane v1.0.0 finalized"
            echo
            echo "- Main: \`$EXPECTED_MAIN_SHA\`"
            echo "- Tag: \`$RELEASE_TAG\` (annotated, peeled to main)"
            echo "- Release assets: \`$RELEASE_ARCHIVE\`, \`$RELEASE_SIDECAR\`"
            echo "- SHA-256: \`$EXPECTED_SHA256\`"
            echo "- Removed superseded release and tag: \`$OLD_RELEASE_TAG\`"
            echo "- Remaining branches: \`main\`"
          } >> "$GITHUB_STEP_SUMMARY"
